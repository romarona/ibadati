<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="عباداتي">
<title>عباداتي – رانيا</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #060e1f;
    --bg-card: #0d1e3d;
    --bg-card2: #112248;
    --gold: #f0a500;
    --gold-light: #f5c842;
    --green: #2ecc71;
    --red: #e74c3c;
    --text: #e8edf8;
    --text-dim: #8899bb;
    --border: rgba(255,255,255,0.08);
    --accent: #3d6fd4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ───── STARS BACKGROUND ───── */
  .stars {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(61,111,212,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(240,165,0,0.06) 0%, transparent 50%);
  }
  .stars::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 25% 45%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 40% 10%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 55% 70%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 70% 30%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 50% 50%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 75% 20%, rgba(255,255,255,0.3), transparent);
  }

  /* ───── HEADER ───── */
  .app-header {
    position: relative; z-index: 10;
    background: linear-gradient(180deg, #0d1e3d 0%, transparent 100%);
    padding: 30px 20px 20px;
    text-align: center;
  }

  .app-header .basmala {
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 1px;
    margin-bottom: 8px;
    opacity: 0.85;
  }

  .app-header h1 {
    font-size: 26px;
    font-weight: 900;
    background: linear-gradient(135deg, #fff 30%, var(--gold-light) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .app-header .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 400;
  }

  /* ───── WEEK NAV ───── */
  .week-nav {
    position: relative; z-index: 10;
    display: flex;
    gap: 8px;
    padding: 0 16px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .week-nav::-webkit-scrollbar { display: none; }

  .day-btn {
    flex-shrink: 0;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    min-width: 70px;
  }
  .day-btn .day-num {
    font-size: 18px;
    font-weight: 800;
    color: var(--text-dim);
    display: block;
    transition: color 0.25s;
  }
  .day-btn .day-name {
    font-size: 11px;
    color: var(--text-dim);
    display: block;
    margin-top: 2px;
    transition: color 0.25s;
  }
  .day-btn .day-progress {
    display: block;
    width: 30px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin: 6px auto 0;
    overflow: hidden;
  }
  .day-btn .day-progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .day-btn.active {
    background: linear-gradient(135deg, #1e3a7d, #2a4fa0);
    border-color: var(--accent);
    box-shadow: 0 4px 20px rgba(61,111,212,0.3);
  }
  .day-btn.active .day-num,
  .day-btn.active .day-name { color: white; }

  /* ───── PROGRESS RING ───── */
  .progress-section {
    position: relative; z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 16px 20px;
    margin: 0 16px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  .ring-wrap {
    position: relative;
    width: 80px; height: 80px;
    flex-shrink: 0;
  }
  .ring-svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 6; }
  .ring-fill {
    fill: none;
    stroke: var(--gold);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 226;
    stroke-dashoffset: 226;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1);
    filter: drop-shadow(0 0 6px rgba(240,165,0,0.5));
  }
  .ring-text {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .ring-percent {
    font-size: 20px; font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }
  .ring-label { font-size: 9px; color: var(--text-dim); margin-top: 2px; }

  .progress-info { flex: 1; }
  .progress-info .day-title {
    font-size: 20px; font-weight: 800; color: white;
    margin-bottom: 4px;
  }
  .progress-info .done-count {
    font-size: 13px; color: var(--text-dim);
  }
  .progress-info .done-count span {
    color: var(--green); font-weight: 700;
  }

  .reset-btn {
    background: rgba(231,76,60,0.15);
    border: 1px solid rgba(231,76,60,0.3);
    color: var(--red);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 12px;
    font-family: 'Tajawal', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .reset-btn:hover { background: rgba(231,76,60,0.25); }

  /* ───── TASKS ───── */
  .tasks-container {
    position: relative; z-index: 10;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .task-section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
    padding: 8px 4px 4px;
    text-transform: uppercase;
  }

  .task-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  .task-card::before {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.25s;
    border-radius: 0 16px 16px 0;
  }

  .task-card.done {
    background: linear-gradient(135deg, rgba(46,204,113,0.08), rgba(46,204,113,0.04));
    border-color: rgba(46,204,113,0.25);
  }
  .task-card.done::before {
    background: var(--green);
    opacity: 1;
  }

  .task-card:active { transform: scale(0.98); }

  .task-icon {
    font-size: 22px;
    flex-shrink: 0;
    width: 36px;
    text-align: center;
  }

  .task-label {
    flex: 1;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    transition: color 0.25s;
  }
  .task-card.done .task-label {
    color: rgba(255,255,255,0.5);
    text-decoration: line-through;
    text-decoration-color: rgba(46,204,113,0.4);
  }

  .task-check {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s ease;
    flex-shrink: 0;
  }
  .task-card.done .task-check {
    background: var(--green);
    border-color: var(--green);
    box-shadow: 0 0 12px rgba(46,204,113,0.4);
  }
  .task-check svg {
    opacity: 0;
    transform: scale(0);
    transition: all 0.2s ease;
  }
  .task-card.done .task-check svg {
    opacity: 1;
    transform: scale(1);
  }

  /* ───── FOOTER ───── */
  .app-footer {
    position: relative; z-index: 10;
    text-align: center;
    padding: 30px 20px 40px;
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.8;
  }
  .app-footer .heart { color: #e74c3c; }

  /* ───── TOAST ───── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: linear-gradient(135deg, #1e3a7d, #2a4fa0);
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Tajawal', sans-serif;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 999;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ───── ALL DONE ANIMATION ───── */
  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(240,165,0,0.3); }
    50% { box-shadow: 0 0 40px rgba(240,165,0,0.6); }
  }
  .all-done-banner {
    display: none;
    position: relative; z-index: 10;
    margin: 0 16px 16px;
    padding: 18px;
    background: linear-gradient(135deg, rgba(240,165,0,0.15), rgba(240,165,0,0.05));
    border: 1px solid rgba(240,165,0,0.3);
    border-radius: 20px;
    text-align: center;
    animation: glow-pulse 2s infinite;
  }
  .all-done-banner .congrats {
    font-size: 20px; font-weight: 900; color: var(--gold);
    margin-bottom: 4px;
  }
  .all-done-banner .subcongrats {
    font-size: 13px; color: var(--text-dim);
  }
</style>
</head>
<body>

<div class="stars"></div>

<div class="app-header">
  <div class="basmala">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
  <h1>لنستعين بالله يا رانيا</h1>
  <div class="subtitle">متابعة العبادات اليومية – الأسبوع الأول</div>
</div>

<!-- Week Navigation -->
<div class="week-nav" id="weekNav"></div>

<!-- Progress -->
<div class="progress-section">
  <div class="ring-wrap">
    <svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">
      <circle class="ring-bg" cx="40" cy="40" r="36"/>
      <circle class="ring-fill" id="ringFill" cx="40" cy="40" r="36"/>
    </svg>
    <div class="ring-text">
      <span class="ring-percent" id="ringPercent">0%</span>
      <span class="ring-label">إنجاز</span>
    </div>
  </div>
  <div class="progress-info">
    <div class="day-title" id="currentDayTitle">اليوم الأول</div>
    <div class="done-count">أتممتِ <span id="doneCount">0</span> من <span id="totalCount">10</span> مهمة</div>
  </div>
  <button class="reset-btn" onclick="resetDay()">إعادة</button>
</div>

<!-- All Done Banner -->
<div class="all-done-banner" id="allDoneBanner">
  <div class="congrats">🌟 ما شاء الله عليكِ يا رانيا! 🌟</div>
  <div class="subcongrats">أتممتِ جميع عباداتكِ اليوم – بارك الله فيكِ</div>
</div>

<!-- Tasks -->
<div class="tasks-container" id="tasksContainer"></div>

<!-- Footer -->
<div class="app-footer">
  <span class="heart">❤️</span>
  لنبتغي فضل الله ورحمته وما عند الله لباقي
  <span class="heart">❤️</span>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS = [
  'الأول', 'الثاني', 'الثالث', 'الرابع',
  'الخامس', 'السادس', 'السابع'
];

const TASKS = [
  { id: 'quran',   icon: '📖', label: 'ورد القرآن – ربع' },
  { id: 'fajr',    icon: '🌙', label: 'صلاة الفجر' },
  { id: 'dhuhr',   icon: '☀️', label: 'صلاة الظهر' },
  { id: 'asr',     icon: '🌤️', label: 'صلاة العصر' },
  { id: 'maghrib', icon: '🌅', label: 'صلاة المغرب' },
  { id: 'isha',    icon: '🌃', label: 'صلاة العشاء' },
  { id: 'morning', icon: '🌸', label: 'أذكار الصباح' },
  { id: 'evening', icon: '🌙', label: 'أذكار المساء' },
  { id: 'dhikr',   icon: '💫', label: 'ذكر الله' },
  { id: 'sadaqa',  icon: '❤️', label: 'صدقة / عمل خير' },
];

const TOASTS = {
  quran:   'بارك الله في قراءتك يا رانيا 📖',
  fajr:    'صلاة الفجر نور يا رانيا 🌙',
  dhuhr:   'جزاكِ الله خيراً ☀️',
  asr:     'أحسنتِ يا رانيا 🤍',
  maghrib: 'بارك الله فيكِ 🌅',
  isha:    'ختمتِ يومكِ بخير 🌃',
  morning: 'اللهم بارك في يومكِ 🌸',
  evening: 'أذكار المساء حصنكِ 🌙',
  dhikr:   'لا إله إلا الله 💫',
  sadaqa:  'الصدقة تطفئ الخطيئة ❤️',
};

let currentDay = 0;
let data = {};

// Load from localStorage
function loadData() {
  try {
    const saved = localStorage.getItem('rania_ibadah_v2');
    if (saved) data = JSON.parse(saved);
  } catch(e) {}
  // Init missing days
  for (let d = 0; d < 7; d++) {
    if (!data[d]) {
      data[d] = {};
      TASKS.forEach(t => data[d][t.id] = false);
    }
  }
}

function saveData() {
  try { localStorage.setItem('rania_ibadah_v2', JSON.stringify(data)); } catch(e) {}
}

function getDayProgress(d) {
  const done = TASKS.filter(t => data[d] && data[d][t.id]).length;
  return { done, total: TASKS.length, pct: Math.round(done / TASKS.length * 100) };
}

function renderWeekNav() {
  const nav = document.getElementById('weekNav');
  nav.innerHTML = '';
  DAYS.forEach((name, i) => {
    const { pct } = getDayProgress(i);
    const btn = document.createElement('div');
    btn.className = 'day-btn' + (i === currentDay ? ' active' : '');
    btn.innerHTML = `
      <span class="day-num">${i + 1}</span>
      <span class="day-name">اليوم ${name}</span>
      <span class="day-progress"><span class="day-progress-fill" style="width:${pct}%"></span></span>
    `;
    btn.onclick = () => { currentDay = i; render(); };
    nav.appendChild(btn);
  });
  // Scroll active into view
  setTimeout(() => {
    const active = nav.querySelector('.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }, 50);
}

function renderProgress() {
  const { done, total, pct } = getDayProgress(currentDay);
  document.getElementById('currentDayTitle').textContent = `اليوم ${DAYS[currentDay]}`;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('ringPercent').textContent = pct + '%';
  const circumference = 226;
  const offset = circumference - (circumference * pct / 100);
  document.getElementById('ringFill').style.strokeDashoffset = offset;

  const banner = document.getElementById('allDoneBanner');
  banner.style.display = (done === total) ? 'block' : 'none';
}

function renderTasks() {
  const container = document.getElementById('tasksContainer');
  container.innerHTML = '';
  TASKS.forEach(task => {
    const isDone = data[currentDay][task.id];
    const card = document.createElement('div');
    card.className = 'task-card' + (isDone ? ' done' : '');
    card.innerHTML = `
      <span class="task-icon">${task.icon}</span>
      <span class="task-label">${task.label}</span>
      <span class="task-check">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7L5.5 10.5L12 3.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    `;
    card.onclick = () => toggleTask(task.id, card);
    container.appendChild(card);
  });
}

function toggleTask(taskId, card) {
  const wasDone = data[currentDay][taskId];
  data[currentDay][taskId] = !wasDone;
  saveData();

  // Animate card
  card.classList.toggle('done', !wasDone);

  if (!wasDone) {
    showToast(TOASTS[taskId] || '✅ أحسنتِ!');
  }

  renderProgress();
  renderWeekNav();
}

function resetDay() {
  if (!confirm('إعادة تعيين يوم ' + DAYS[currentDay] + '؟')) return;
  TASKS.forEach(t => data[currentDay][t.id] = false);
  saveData();
  render();
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function render() {
  renderWeekNav();
  renderProgress();
  renderTasks();
}

// Init
loadData();
render();
</script>
</body>
</html>
